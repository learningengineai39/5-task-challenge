<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Snake Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="app-shell">
    <section class="hud-panel" aria-label="Game status">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Neon Snake Arena</h1>
          <p>Arcade survival grid</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>High</span>
          <strong id="highScore">0</strong>
        </div>
        <div class="stat">
          <span>Food</span>
          <strong id="foodEaten">0</strong>
        </div>
        <div class="stat">
          <span>Level</span>
          <strong id="level">1</strong>
        </div>
      </div>

      <div class="control-group">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="control-group">
        <span>Snake Skin</span>
        <div class="skin-row" role="radiogroup" aria-label="Snake skin">
          <button class="skin is-active" type="button" data-skin="volt" aria-label="Volt skin"></button>
          <button class="skin" type="button" data-skin="ruby" aria-label="Ruby skin"></button>
          <button class="skin" type="button" data-skin="aqua" aria-label="Aqua skin"></button>
          <button class="skin" type="button" data-skin="solar" aria-label="Solar skin"></button>
        </div>
      </div>

      <div class="power-panel">
        <div class="power-title">Power-Ups</div>
        <div id="powerList" class="power-list">
          <span class="empty-power">None active</span>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn" class="primary-btn" type="button">Start</button>
        <button id="pauseBtn" type="button" disabled>Pause</button>
        <button id="restartBtn" type="button">Restart</button>
        <button id="soundBtn" type="button" aria-pressed="true">Sound On</button>
      </div>
    </section>

    <section class="game-stage" aria-label="Snake game board">
      <div class="board-wrap">
        <canvas id="gameCanvas" width="720" height="720" aria-label="Snake game canvas"></canvas>
        <div id="overlay" class="overlay is-visible">
          <div class="overlay-content">
            <span id="overlayKicker">Ready</span>
            <h2 id="overlayTitle">Enter the grid</h2>
            <p id="overlayText">Choose a difficulty and press Start. Use arrows, WASD, or swipe to steer.</p>
          </div>
        </div>
        <div id="scorePopLayer" class="score-pop-layer" aria-hidden="true"></div>
      </div>

      <div class="touch-pad" aria-label="Touch controls">
        <button type="button" data-dir="up" aria-label="Move up">▲</button>
        <button type="button" data-dir="left" aria-label="Move left">◀</button>
        <button type="button" data-dir="down" aria-label="Move down">▼</button>
        <button type="button" data-dir="right" aria-label="Move right">▶</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
