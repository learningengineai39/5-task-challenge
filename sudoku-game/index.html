<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Puzzle Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header glass">
      <div>
        <p class="eyebrow">Sudoku Puzzle Generator</p>
        <h1>Sudoku</h1>
      </div>

      <div class="header-actions">
        <label class="field">
          <span>Difficulty</span>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>

        <button id="themeToggle" class="button ghost" type="button" aria-pressed="false">Dark</button>
      </div>
    </header>

    <section class="stats glass" aria-label="Game status">
      <div class="stat">
        <span>Time</span>
        <strong id="timer">00:00</strong>
      </div>
      <div class="stat">
        <span>Mistakes</span>
        <strong><span id="mistakes">0</span>/3</strong>
      </div>
      <div class="stat">
        <span>Hints</span>
        <strong id="hints">3</strong>
      </div>
      <button id="pauseButton" class="button" type="button">Pause</button>
    </section>

    <section class="layout">
      <section class="board-panel glass" aria-label="Sudoku board section">
        <div id="board" class="board" role="grid" aria-label="Sudoku board"></div>
        <div id="pauseOverlay" class="pause-overlay" hidden>
          <p>Paused</p>
          <button id="resumeButton" class="button primary" type="button">Resume</button>
        </div>
      </section>

      <aside class="panel glass" aria-label="Controls">
        <div class="controls">
          <button id="newGame" class="button primary" type="button">New Game</button>
          <button id="solvePuzzle" class="button" type="button">Solve Puzzle</button>
          <button id="resetBoard" class="button" type="button">Reset Board</button>
          <button id="checkSolution" class="button" type="button">Check Solution</button>
          <button id="getHint" class="button" type="button">Get Hint</button>
          <button id="clearCell" class="button" type="button">Clear Cell</button>
        </div>

        <div class="toggles">
          <label>
            <input id="notesMode" type="checkbox">
            Notes mode
          </label>
          <label>
            <input id="strictMode" type="checkbox" checked>
            3-mistake mode
          </label>
        </div>

        <div class="history">
          <button id="undo" class="button" type="button">Undo</button>
          <button id="redo" class="button" type="button">Redo</button>
        </div>

        <div id="numberPad" class="number-pad" aria-label="Number pad"></div>

        <section class="leaderboard">
          <h2>Best Times</h2>
          <ol id="leaderboard"></ol>
        </section>
      </aside>
    </section>
  </main>

  <div id="modal" class="modal" hidden>
    <section class="modal-card glass" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <p id="modalEyebrow" class="eyebrow">Result</p>
      <h2 id="modalTitle">Puzzle Complete</h2>
      <p id="modalMessage"></p>
      <dl id="modalStats" class="modal-stats" hidden></dl>
      <div class="modal-actions">
        <button id="modalClose" class="button" type="button">Close</button>
        <button id="modalPlayAgain" class="button primary" type="button" hidden>New Game</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
